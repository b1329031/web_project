<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarWords ✦ 背單字</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">StarWords</a>
  <div class="nav-links">
    <a href="quiz.html" class="nav-link active">📚 背單字</a>
    <a href="gacha.html" class="nav-link">🎁 抽盲盒</a>
    <a href="profile.html" class="nav-link">🎴 卡冊</a>
  </div>
  <div class="nav-points">
    <span style="color:var(--muted);font-size:.8rem">點數</span>
    <span class="pts-badge">⭐ <span id="nav-points">0</span></span>
  </div>
</nav>

<main>
  <div id="quiz-section">
    <div class="panel">
      <div class="quiz-progress"><div class="quiz-progress-bar" id="qpbar" style="width:0%"></div></div>
      <div style="text-align:center">
        <div class="combo-badge" id="combo-badge" style="display:none">🔥 <span id="combo-num">0</span> 連擊！</div>
      </div>
      <div class="quiz-group-tag">詞彙練習</div>
      <div class="quiz-word" id="q-chinese">載入中...</div>
      <div class="quiz-hint" id="q-hint">輸入對應的英文單字</div>
      <input class="quiz-input" id="quiz-input" type="text" placeholder="輸入英文..." autocomplete="off">
      <div class="feedback-msg" id="feedback-msg"></div>
      <div class="quiz-actions">
        <button class="btn btn-secondary" onclick="skipWord()">跳過</button>
        <button class="btn btn-primary" onclick="submitAnswer()">確認 ↵</button>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:1.5rem;font-size:.85rem;color:var(--muted)">
      <span>答對 <b style="color:var(--green)" id="stat-correct">0</b></span>
      <span>答錯 <b style="color:var(--red)" id="stat-wrong">0</b></span>
      <span>已解鎖 <b style="color:var(--accent)" id="stat-prog">0</b> 個</span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="js/state.js"></script>
<script>
requireLogin();

const username = getUsername();
let words = [];
let curIdx = 0;
let combo = 0;
let bestCombo = 0;
let totalCorrect = 0;
let totalWrong = 0;
let answeredSet = new Set();
let feedbackTimer = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

async function init() {
  try {
    const [wRes, uRes] = await Promise.all([
      fetch(`${API}/words/`),
      fetchUser(username)
    ]);
    words = shuffle(await wRes.json());
    const user = uRes;
    totalCorrect = user.correct;
    totalWrong = user.wrong;
    setNavPoints(user.points);
    updateStats();
    loadWord();
  } catch(e) {
    document.getElementById('q-chinese').textContent = '連線失敗';
    showToast('請確認後端伺服器已啟動', 'error');
  }
}

function loadWord() {
  if (!words.length) return;
  if (curIdx >= words.length) { words = shuffle([...words]); curIdx = 0; }
  const w = words[curIdx];
  document.getElementById('q-chinese').textContent = w.chinese;
  document.getElementById('q-hint').textContent = `提示：${w.english.length} 個字母`;
  document.getElementById('quiz-input').value = '';
  document.getElementById('quiz-input').className = 'quiz-input';
  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('feedback-msg').className = 'feedback-msg';
  document.getElementById('qpbar').style.width = `${(answeredSet.size / words.length) * 100}%`;
  document.getElementById('quiz-input').focus();
}

async function submitAnswer() {
  const input = document.getElementById('quiz-input');
  const ans = input.value.trim().toLowerCase();
  const w = words[curIdx];
  if (!ans) return;

  const isCorrect = ans === w.english.toLowerCase();

  try {
    const res = await fetch(`${API}/user/${encodeURIComponent(username)}/answer/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ word_id: w.id, correct: isCorrect })
    });
    const user = await res.json();
    setNavPoints(user.points);
    totalCorrect = user.correct;
    totalWrong = user.wrong;
  } catch(e) {}

  if (isCorrect) {
    combo++;
    if (combo > bestCombo) bestCombo = combo;
    answeredSet.add(w.chinese);
    input.className = 'quiz-input correct';
    setFeedback('✅ 正確！+1 點', 'ok');
    updateStats();
    setTimeout(() => { curIdx++; loadWord(); }, 900);
  } else {
    combo = 0;
    input.className = 'quiz-input wrong';
    setFeedback(`❌ 答錯了！答案是：${w.english}`, 'bad');
    updateStats();
    setTimeout(() => { curIdx++; loadWord(); }, 1500);
  }
}

function skipWord() {
  combo = 0;
  curIdx++;
  updateStats();
  loadWord();
}

function setFeedback(msg, type) {
  clearTimeout(feedbackTimer);
  const el = document.getElementById('feedback-msg');
  el.textContent = msg;
  el.className = `feedback-msg ${type}`;
  feedbackTimer = setTimeout(() => {
    el.textContent = '';
    el.className = 'feedback-msg';
  }, 2000);
}

function updateStats() {
  document.getElementById('stat-correct').textContent = totalCorrect;
  document.getElementById('stat-wrong').textContent = totalWrong;
  document.getElementById('stat-prog').textContent = answeredSet.size;

  if (combo > 1) {
    document.getElementById('combo-badge').style.display = 'inline-flex';
    document.getElementById('combo-num').textContent = combo;
  } else {
    document.getElementById('combo-badge').style.display = 'none';
  }
}

document.getElementById('quiz-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

init();
</script>
</body>
</html>
